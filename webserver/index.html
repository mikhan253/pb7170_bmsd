<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BMS Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/gh/paroga/cbor-js/cbor.js"></script>

<style>
body {
  background-color: #f8f9fa;
  font-family: 'Inter', sans-serif;
}
.pack-card {
  border-radius: 1rem;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  margin-bottom: 1.5rem;
}
.pack-header {
  font-weight: 600;
  font-size: 1.2rem;
}
.bit-active {
  background-color: #28a745 !important;
  color: white !important;
}
.bit-warning {
  background-color: #ffc107 !important;
  color: black !important;
}
.cell-field, .ntc-field {
  flex: 0 0 auto;
  padding: 4px 6px;
  margin: 1px;
  border-radius: 4px;
  text-align: center;
  min-width: 80px;
  cursor: default;
}
</style>
</head>
<body class="p-3">

<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Batteriemanagementsystem</h2>
  </div>

  <div id="packsContainer" class="row gy-3">
    <!-- Global Status + Packs -->
  </div>
</div>

<script type="module">
const ERROR_TEXTS = [
  "Chip Übertemperatur", "Chip Untertemperatur", "Zellfehler 1", "Zellfehler 2",
  "Kommunikationsfehler", "Spannungsabweichung", "Überstrom", "Isolationsfehler"
];
const MOS_BITS = ["Laden", "Entladen", "Vorladen"];
const packsContainer = document.getElementById("packsContainer");

async function fetchData() {
  try {
    const res = await fetch("/api/bmsdata", { cache: "no-store" });
    const buffer = await res.arrayBuffer();
    const data = CBOR.decode(buffer);
    renderPacks(data);
  } catch (err) {
    console.error("API Fehler:", err);
  }
}

function renderPacks(data) {
  packsContainer.innerHTML = "";
  const allPacks = Object.entries(data).filter(([_, p]) => p.id);

  // ---------- Global Status ----------
  const globalStatus = calculateGlobalStatus(allPacks);
  const globalCard = document.createElement("div");
  globalCard.className = "col-12";

  const mosHtmlGlobal = MOS_BITS.map((t,i)=>{
    const allOn = allPacks.every(([_,p]) => (p.mosfetStatus & (1<<i)));
    const anyOn = allPacks.some(([_,p]) => (p.mosfetStatus & (1<<i)));
    let cls = "text-muted";
    if(allOn) cls = "text-success fw-bold";
    else if(anyOn) cls = "text-warning fw-bold";

    return `<div class="me-3 d-inline-flex align-items-center mb-1">
              <span class="${cls} me-1">${t}</span>
              <button class="btn btn-sm btn-outline-success me-1" onclick="sendCommand('${t.toLowerCase()}_on')">EIN</button>
              <button class="btn btn-sm btn-outline-danger" onclick="sendCommand('${t.toLowerCase()}_off')">AUS</button>
            </div>`;
  }).join("");

  globalCard.innerHTML = `
  <div class="card pack-card">
    <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
      <span class="pack-header">Global Status</span>
    </div>
    <div class="card-body">
      <div><strong>Mittlere Spannung:</strong> ${globalStatus.avgVoltage.toFixed(3)} V</div>
      <div><strong>Summe Ströme:</strong> ${globalStatus.totalCurrent.toFixed(3)} A</div>
      <div><strong>Mittlere NTC Temperatur:</strong> ${globalStatus.avgTemperature.toFixed(1)} °C</div>
      <hr>
      <div><strong>Mittlerer SOC:</strong></div>
      <div class="progress mb-2" style="height:20px;">
        <div class="progress-bar bg-success" role="progressbar" style="width:${globalStatus.avgSOC.toFixed(1)}%" aria-valuenow="${globalStatus.avgSOC.toFixed(1)}" aria-valuemin="0" aria-valuemax="100">
          ${globalStatus.avgSOC.toFixed(1)}%
        </div>
      </div>
      <div><strong>Mittlerer SOH:</strong></div>
      <div class="progress mb-2" style="height:20px;">
        <div class="progress-bar bg-info" role="progressbar" style="width:${globalStatus.avgSOH.toFixed(1)}%" aria-valuenow="${globalStatus.avgSOH.toFixed(1)}" aria-valuemin="0" aria-valuemax="100">
          ${globalStatus.avgSOH.toFixed(1)}%
        </div>
      </div>
      <hr>
      <div><strong>Packs mit Fehler:</strong> ${globalStatus.packsWithError.length ? globalStatus.packsWithError.map(p => `<span class="badge bg-danger me-1">${p}</span>`).join('') : "<span class='text-muted'>Keine</span>"}</div>
      <div><strong>Packs mit Warnung:</strong> ${globalStatus.packsWithWarn.length ? globalStatus.packsWithWarn.map(p => `<span class="badge bg-warning text-dark me-1">${p}</span>`).join('') : "<span class='text-muted'>Keine</span>"}</div>
      <hr>
      <div><strong>Max Zellspannung:</strong> ${globalStatus.maxCell.value.toFixed(3)} V (Pack: ${globalStatus.maxCell.pack}, Zelle: C${globalStatus.maxCell.index+1})</div>
      <div><strong>Min Zellspannung:</strong> ${globalStatus.minCell.value.toFixed(3)} V (Pack: ${globalStatus.minCell.pack}, Zelle: C${globalStatus.minCell.index+1})</div>
      <hr>
      <div><strong>MOS Status Global:</strong></div>
      <div class="d-flex flex-wrap mb-2">${mosHtmlGlobal}</div>
    </div>
  </div>
  `;
  packsContainer.appendChild(globalCard);

  // ---------- Einzelne Packs ----------
  allPacks.forEach(([name, pack]) => {
    const alertBits = decodeBits(pack.swAlertFlags, ERROR_TEXTS, 'bit-active');
    const warnBits = decodeBits(pack.swWarningFlags, ERROR_TEXTS, 'bit-warning');
    const mosHtml = MOS_BITS.map((t,i)=>{
      const active = (pack.mosfetStatus & (1<<i)) ? "text-success fw-bold" : "text-muted";
      return `<div class="me-3 d-inline-flex align-items-center mb-1">
                <span class="${active} me-1">${t}</span>
                <button class="btn btn-sm btn-outline-success me-1" onclick="sendCommand('${t.toLowerCase()}_on','${name}')">EIN</button>
                <button class="btn btn-sm btn-outline-danger" onclick="sendCommand('${t.toLowerCase()}_off','${name}')">AUS</button>
              </div>`;
    }).join("");

    const cellBal = decode16Bits(pack.hwBalancerStatus);
    let headerClass = "bg-primary text-white";
    if (pack.swAlertFlags !== 0) headerClass = "bg-danger text-white";
    else if (pack.swWarningFlags !== 0) headerClass = "bg-warning text-dark";

    const maxCellIndex = pack.cells.indexOf(Math.max(...pack.cells));
    const minCellIndex = pack.cells.indexOf(Math.min(...pack.cells));
    const diffCell = Math.max(...pack.cells) - Math.min(...pack.cells);

    const cellsHTML = `
      <div><strong>Zellen:</strong> (Δ: ${diffCell.toFixed(3)} V)</div>
      <div class="d-flex flex-wrap mt-2">
        ${pack.cells.map((v, i) => {
          let bg = "#d3d3d3";
          if (i === maxCellIndex) bg = "#ff4d4d";
          else if (i === minCellIndex) bg = "#4d79ff";
          const fontStyle = cellBal[i] ? "font-weight:bold; color: #b58900;" : "";
          return `<div class="cell-field" style="background-color:${bg}; ${fontStyle}">C${i+1}: ${v.toFixed(3)} V</div>`;
        }).join("")}
      </div>
    `;

    const ntcHTML = `
      <div class="mt-2"><strong>NTCs:</strong></div>
      <div class="d-flex flex-wrap">
        ${pack.ntcTemperature.map((t, i) => `<div class="ntc-field" style="background-color:#d3d3d3">T${i+1}: ${t.toFixed(1)} °C</div>`).join("")}
      </div>
    `;

    const card = document.createElement("div");
    card.className = "col-lg-6 col-12";
    card.innerHTML = `
      <div class="card pack-card">
        <div class="card-header ${headerClass} d-flex justify-content-between align-items-center">
          <span class="pack-header">${name}</span>
          <small>SOC: ${pack.stateOfCharge.toFixed(1)}% | SOH: ${pack.stateOfHealth.toFixed(1)}%</small>
        </div>
        <div class="card-body">
          <div><strong>Spannung:</strong> ${pack.voltage.toFixed(3)} V</div>
          <div><strong>Strom:</strong> ${pack.current.toFixed(3)} A</div>
          <div><strong>Zyklen:</strong> ${pack.cycleCount.toFixed(0)}</div>
          <hr>
          <div><strong>Alarme:</strong> ${alertBits}</div>
          <div><strong>Warnungen:</strong> ${warnBits}</div>
          <hr>
          <div><strong>MOS Status:</strong></div>
          <div class="d-flex flex-wrap mb-2">${mosHtml}</div>
          <hr>
          <div><strong>SOC:</strong></div>
          <div class="progress mb-2" style="height:20px;">
            <div class="progress-bar bg-success" role="progressbar" style="width:${pack.stateOfCharge.toFixed(1)}%" aria-valuenow="${pack.stateOfCharge.toFixed(1)}" aria-valuemin="0" aria-valuemax="100">
              ${pack.stateOfCharge.toFixed(1)}%
            </div>
          </div>
          <div><strong>SOH:</strong></div>
          <div class="progress mb-2" style="height:20px;">
            <div class="progress-bar bg-info" role="progressbar" style="width:${pack.stateOfHealth.toFixed(1)}%" aria-valuenow="${pack.stateOfHealth.toFixed(1)}" aria-valuemin="0" aria-valuemax="100">
              ${pack.stateOfHealth.toFixed(1)}%
            </div>
          </div>
          ${cellsHTML}
          <hr>
          ${ntcHTML}
          <div class="mt-2"><strong>Die:</strong> ${pack.dieTemperature.toFixed(3)}°C | <strong>PVDD:</strong> ${pack.pvddVoltage.toFixed(3)} V</div>
        </div>
      </div>
    `;
    packsContainer.appendChild(card);
  });
}

// ---------- Hilfsfunktionen ----------
function decodeBits(value, texts, cssClass) {
  let bits = [];
  for (let i=0;i<texts.length;i++){
    if(value & (1<<i)) bits.push(`<span class="badge ${cssClass} me-1">${texts[i]}</span>`);
  }
  return bits.length?bits.join(" "):"<span class='text-muted'>Keine</span>";
}
function decode16Bits(value){ const arr=[]; for(let i=0;i<16;i++) arr.push(!!(value & (1<<i))); return arr; }
function calculateGlobalStatus(allPacks){
  let sumVoltage=0, sumCurrent=0, sumTemp=0, sumSOC=0, sumSOH=0, count=0;
  let packsWithError=[], packsWithWarn=[];
  let maxCell={value:-Infinity, pack:"", index:-1}, minCell={value:Infinity, pack:"", index:-1};
  allPacks.forEach(([name,p])=>{
    if(p.swAlertFlags) packsWithError.push(name);
    if(p.swWarningFlags) packsWithWarn.push(name);
    sumVoltage += p.voltage;
    sumCurrent += p.current;
    sumTemp += p.ntcTemperature.reduce((a,b)=>a+b,0)/p.ntcTemperature.length;
    sumSOC += p.stateOfCharge;
    sumSOH += p.stateOfHealth;
    count++;
    p.cells.forEach((v,i)=>{
      if(v>maxCell.value){ maxCell.value=v; maxCell.pack=name; maxCell.index=i;}
      if(v<minCell.value){ minCell.value=v; minCell.pack=name; minCell.index=i;}
    });
  });
  return {
    avgVoltage: sumVoltage/count,
    totalCurrent: sumCurrent,
    avgTemperature: sumTemp/count,
    avgSOC: sumSOC/count,
    avgSOH: sumSOH/count,
    packsWithError,
    packsWithWarn,
    maxCell,
    minCell
  };
}

function sendCommand(cmd, pack=null){
  fetch("/api/cmd",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cmd,pack})}).catch(e=>console.error("Command Error",e));
}

setInterval(fetchData,1000);
fetchData();
</script>
</body>
</html>
